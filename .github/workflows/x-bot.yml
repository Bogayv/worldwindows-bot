name: Auto Post News to X
on:
  workflow_dispatch: # Manuel başlatma butonu için
  schedule:
    - cron: '0 * * * *'

jobs:
  tweet-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: npm install twitter-api-v2 rss-parser
      - name: Run Bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        # BURASI KRİTİK: Dosyayı tam yoluyla çağırıyoruz
        run: node ./scripts/x-bot.js
